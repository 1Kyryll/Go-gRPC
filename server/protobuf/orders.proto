syntax = "proto3";    
package orders;
option go_package = "github.com/1kyryll/go-grpc/internal/common/gen/orders";

service OrderService {
    rpc CreateOrder (CreateOrderRequest) returns (CreateOrderResponse);
    rpc GetOrders (GetOrdersRequest) returns (GetOrdersResponse);
    rpc StreamCreatedOrders (StreamCreatedOrdersRequest) returns (stream Order);
}

message OrderItemInput {
    int32 menu_item_id = 1;
    int32 quantity = 2;
    string special_instructions = 3;
}

message Order {
    int32 id = 1; 
    int32 customer_id = 2;
    string status = 3;
}

message OrderEvent { 
    string event_type = 1; 
    int32 order_id = 2; 
    int32 customer_id = 3; 
    string status = 4; 
    repeated OrderItemInput items = 5; 
}

message StreamCreatedOrdersRequest {}

message CreateOrderRequest {
    int32 customer_id = 1;
    repeated OrderItemInput items = 2;
}

message CreateOrderResponse {
    string status = 1;
}

message GetOrdersRequest {
    int32 customer_id = 1;
}

message GetOrdersResponse {
    repeated Order orders = 1;
}