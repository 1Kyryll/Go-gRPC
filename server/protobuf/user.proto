syntax = "proto3";
package user;
option go_package = "github.com/1kyryll/go-grpc/internal/common/gen/user";

service UserService {
    rpc Register (RegisterRequest) returns (RegisterResponse);
    rpc Login (LoginRequest) returns (LoginResponse);
    rpc GetUser (GetUserRequest) returns (User);
}

message User {
    int32 id = 1;
    string username = 2;
    string email = 3;
    string phone = 4;
}

message RegisterRequest {
    string username = 1;
    string email = 2;
    string password = 3;
    string phone = 4;
}

message RegisterResponse {
    User user = 1;
    string access_token = 2;
    int64 expired_at = 3;
}

message LoginRequest {
    string username = 1;
    string password = 2;
}

message LoginResponse {
    User user = 1;
    string access_token = 2;
    int64 expired_at = 3;
}

message GetUserRequest {
    int32 id = 1;
}
