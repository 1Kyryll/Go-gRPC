version: "2"
sql:
  - engine: "postgresql"
    schema: 
      - "internal/services/common/migrations"
    queries: 
      - "internal/services/common/sqlc/queries.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/services/common/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: true
        overrides:
          - db_type: "numeric"
            go_type: "float64"
