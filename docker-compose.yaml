services:
  postgres:
    image: postgres:16-alpine
    container_name: RSM-DB
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  orders:
    build:
      context: ./server
      dockerfile: cmd/orders/Dockerfile
    container_name: RSM-Orders
    environment:
      GOOSE_DBSTRING: host=postgres port=5432 user=${DB_USER} password=${DB_PASSWORD} dbname=${DB_NAME} sslmode=disable
    ports:
      - "8080:8080"
      - "9000:9000"
    depends_on:
      - postgres

  kitchen:
    build:
      context: ./server
      dockerfile: cmd/kitchen/Dockerfile
    container_name: RSM-Kitchen
    environment:
      GOOSE_DBSTRING: host=postgres port=5432 user=${DB_USER} password=${DB_PASSWORD} dbname=${DB_NAME} sslmode=disable
      ORDERS_GRPC_ADDR: orders:9000
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - orders

  user:
    build:
      context: ./server
      dockerfile: cmd/user/Dockerfile
    container_name: RSM-User
    environment:
      GOOSE_DBSTRING: host=postgres port=5432 user=${DB_USER} password=${DB_PASSWORD} dbname=${DB_NAME} sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8083:8083"
      - "9001:9001"
    depends_on:
      - postgres

  gateway:
    build:
      context: ./server
      dockerfile: cmd/gateway/Dockerfile
    container_name: RSM-Gateway
    environment:
      GOOSE_DBSTRING: host=postgres port=5432 user=${DB_USER} password=${DB_PASSWORD} dbname=${DB_NAME} sslmode=disable
      ORDERS_GRPC_ADDR: orders:9000
      USER_GRPC_ADDR: user:9001
      GATEWAY_PORT: "8082"
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - orders
      - user

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: RSM-Client
    environment:
      - NEXT_PUBLIC_GRAPHQL_URL=http://gateway:8082/graphql
    ports:
      - "3000:3000"
    depends_on:
      - orders
      - kitchen
      - gateway

volumes:
  postgres_data:
